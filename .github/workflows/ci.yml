name: ci

on:
  push:
    branches: [main]
    paths-ignore:
      - 'docs/**'
      - '*.md'
      - 'LICENSE*'
  pull_request:
    branches: [main]
    paths-ignore:
      - 'docs/**'
      - '*.md'
      - 'LICENSE*'

permissions:
  contents: read

jobs:
  test:
    name: test (Go ${{ matrix.go }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        go: ["1.26.x"]
    steps:
      - name: checkout
        uses: actions/checkout@v4

      - name: setup-go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ matrix.go }}
          check-latest: true
          cache: true

      - name: gofmt
        run: |
          set -e
          unformatted="$(gofmt -l .)"
          if [ -n "$unformatted" ]; then
            echo "::error::gofmt found unformatted files:"
            echo "$unformatted"
            exit 1
          fi

      - name: go vet
        run: go vet ./...

      - name: go test
        run: go test -race -count=1 ./...

      - name: go build
        run: go build -trimpath -o /tmp/ircat ./cmd/ircat

  staticcheck:
    name: staticcheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.26.x"
          check-latest: true
          cache: true
      - name: install
        run: go install honnef.co/go/tools/cmd/staticcheck@latest
      - name: run
        run: staticcheck ./...

  fuzz-sandbox:
    # Drives the existing FuzzSandboxNeverPanics target for 5
    # minutes on every PR. The seed corpus already runs as a
    # regression test in the main `test` job; this matrix entry
    # exists so we get real fuzzing coverage on each change
    # rather than waiting for a manual nightly trigger. The
    # 5-minute budget is short enough to keep PR feedback fast
    # and long enough to find a regression in the sandbox
    # close-out path before it merges.
    #
    # continue-on-error: the sandbox kill path has a known bug
    # where tight Lua allocation loops can exceed the 100ms
    # budget by 10x, causing the fuzzer to hang during
    # minimization. Until the sandbox enforcer is fixed, this
    # job must not block CI.
    name: fuzz sandbox
    runs-on: ubuntu-latest
    continue-on-error: true
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.26.x"
          check-latest: true
          cache: true
      - name: fuzz
        env:
          # gopher-lua table/string allocations bypass the sandbox's
          # RegistrySlots cap, so over millions of fuzz iterations
          # the worker can OOM before GC catches up. A soft memory
          # limit makes the GC far more aggressive under pressure,
          # keeping RSS in check without slowing down normal runs.
          GOMEMLIMIT: 512MiB
        run: |
          go test -run='^$' -fuzz=FuzzSandboxNeverPanics \
            -fuzztime=5m -parallel=2 ./internal/bots/
