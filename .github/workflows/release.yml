name: release

# Triggered on every annotated tag matching v*. Runs goreleaser
# to build cross-platform archives, push the multi-arch
# container image to ghcr.io, generate SBOMs via syft, and sign
# everything with cosign keylessly through the GitHub OIDC
# provider. The resulting GitHub release is the canonical place
# operators download from; the install.sh bootstrap script
# resolves the latest tag from there.

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write    # create the GitHub release
  packages: write    # push the container image to ghcr.io
  id-token: write    # OIDC for cosign keyless signing

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: checkout
        uses: actions/checkout@v4
        with:
          # goreleaser needs the full history to compute the
          # changelog from the previous tag.
          fetch-depth: 0

      - name: setup-go
        uses: actions/setup-go@v5
        with:
          go-version: '1.26.x'
          check-latest: true
          cache: true

      - name: setup-qemu
        uses: docker/setup-qemu-action@v3

      - name: setup-buildx
        uses: docker/setup-buildx-action@v3

      - name: login-ghcr
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: install-syft
        uses: anchore/sbom-action/download-syft@v0

      - name: install-cosign
        uses: sigstore/cosign-installer@v3

      - name: goreleaser
        uses: goreleaser/goreleaser-action@v6
        with:
          distribution: goreleaser
          version: '~> v2'
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # No COSIGN_PASSWORD: we use keyless signing via
          # the OIDC token granted by id-token: write above.

  # The smoke job runs the published install.sh against a
  # throwaway container so a broken release script never lands
  # without surfacing in the next push. It uses the same tag the
  # release job just produced.
  install-smoke:
    needs: release
    runs-on: ubuntu-latest
    steps:
      - name: download via install.sh
        run: |
          set -e
          docker run --rm \
            -e IRCAT_VERSION=${{ github.ref_name }} \
            -e IRCAT_PREFIX=/tmp/ircat-bin \
            alpine:3.20 sh -c '
              apk add --no-cache curl tar coreutils
              mkdir -p /tmp/ircat-bin
              curl -fsSL https://raw.githubusercontent.com/${{ github.repository }}/${{ github.ref_name }}/scripts/install.sh | sh
              /tmp/ircat-bin/ircat --version
            '
