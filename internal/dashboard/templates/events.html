{{define "content"}}
<h2>audit log</h2>
<p class="subtitle">{{len .Events}} most recent</p>

<div class="panel">
  {{if .Events}}
  <table>
    <thead><tr><th>timestamp</th><th>type</th><th>actor</th><th>target</th><th>data</th></tr></thead>
    <tbody>
    {{range .Events}}
    <tr>
      <td class="muted">{{.Timestamp}}</td>
      <td><span class="pill">{{.Type}}</span></td>
      <td><code>{{.Actor}}</code></td>
      <td>{{.Target}}</td>
      <td><code>{{.DataJSON}}</code></td>
    </tr>
    {{end}}
    </tbody>
  </table>
  {{else}}
  <p class="muted">no events recorded yet.</p>
  {{end}}
</div>
{{end}}
