{{define "content"}}
<h2>users ({{len .Users}})</h2>
{{if .Users}}
<table>
<thead><tr><th>nick</th><th>hostmask</th><th>modes</th><th>channels</th><th></th></tr></thead>
<tbody>
{{range .Users}}
<tr>
<td>{{.Nick}}</td>
<td>{{.Hostmask}}</td>
<td>+{{.Modes}}</td>
<td>{{range .Channels}}{{.}} {{end}}</td>
<td>
<form method="post" action="/dashboard/users/{{.Nick}}/kick" class="inline">
<input type="hidden" name="csrf" value="{{$.CSRF}}">
<button type="submit">kick</button>
</form>
</td>
</tr>
{{end}}
</tbody>
</table>
{{else}}
<p>no users connected.</p>
{{end}}
{{end}}
