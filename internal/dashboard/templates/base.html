{{define "base"}}<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>{{.Title}} — ircat</title>
<link rel="stylesheet" href="/dashboard/static/style.css">
{{if .Operator}}<script src="/dashboard/static/htmx.min.js" defer></script>{{end}}
</head>
<body>
{{if .Operator}}
<div class="layout">
  <aside class="sidebar">
    <div class="brand">
      <a href="/dashboard">ircat</a>
      <small>{{.ServerName}}</small>
    </div>
    <nav>
      <a href="/dashboard"            class="{{if eq .NavActive "overview"}}active{{end}}">overview</a>
      <a href="/dashboard/users"      class="{{if eq .NavActive "users"}}active{{end}}">users</a>
      <a href="/dashboard/channels"   class="{{if eq .NavActive "channels"}}active{{end}}">channels</a>
      <a href="/dashboard/federation" class="{{if eq .NavActive "federation"}}active{{end}}">federation</a>
      <a href="/dashboard/bots"       class="{{if eq .NavActive "bots"}}active{{end}}">bots</a>
      <a href="/dashboard/operators"  class="{{if eq .NavActive "operators"}}active{{end}}">operators</a>
      <a href="/dashboard/tokens"     class="{{if eq .NavActive "tokens"}}active{{end}}">tokens</a>
      <a href="/dashboard/events"     class="{{if eq .NavActive "events"}}active{{end}}">audit log</a>
      <a href="/dashboard/logs"       class="{{if eq .NavActive "logs"}}active{{end}}">live logs</a>
    </nav>
    <div class="session">
      signed in as <strong>{{.Operator}}</strong>
      <form method="post" action="/dashboard/logout">
        <input type="hidden" name="csrf" value="{{.CSRF}}">
        <button type="submit">sign out</button>
      </form>
    </div>
  </aside>
  <main>
    {{template "content" .}}
  </main>
</div>
{{else}}
<div class="layout" style="grid-template-columns: 1fr;">
  <main>
    {{template "content" .}}
  </main>
</div>
{{end}}
</body>
</html>
{{end}}
