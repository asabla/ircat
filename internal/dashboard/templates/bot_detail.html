{{define "content"}}
<h2>bot &mdash; {{.BotDetail.Name}}</h2>
<p class="subtitle"><a href="/dashboard/bots">&larr; all bots</a></p>

{{if .Flash}}<p class="error">{{.Flash}}</p>{{end}}

<div class="panel">
  <h3>state</h3>
  <dl class="kv">
    <dt>id</dt><dd><code>{{.BotDetail.ID}}</code></dd>
    <dt>name</dt><dd>{{.BotDetail.Name}}</dd>
    <dt>enabled</dt><dd>
      {{if .BotDetail.Enabled}}<span class="pill ok">enabled</span>{{else}}<span class="pill warn">disabled</span>{{end}}
    </dd>
    {{if .BotDetail.Status}}<dt>status</dt><dd>{{.BotDetail.Status}}</dd>{{end}}
  </dl>
</div>

<div class="panel">
  <h3>source</h3>
  <form method="post" action="/dashboard/bots/{{.BotDetail.ID}}/source" id="bot-source-form">
    <input type="hidden" name="csrf" value="{{.CSRF}}">
    <textarea name="source" rows="20">{{.BotDetail.Source}}</textarea>
    <div class="toolbar">
      <button type="submit" class="primary">save source</button>
      <button type="button"
              hx-post="/dashboard/bots/validate"
              hx-include="#bot-source-form"
              hx-target="#validate-result"
              hx-swap="innerHTML">validate</button>
      <span id="validate-result"></span>
    </div>
  </form>
</div>
{{end}}
