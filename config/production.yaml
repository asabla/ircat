version: 1
server:
  name: irc.example.org
  description: "ircat production"
  network: ExampleNet
  motd_file: /etc/ircat/motd.txt
  admin:
    name: "Your Name"
    email: "admin@example.org"
  listeners:
    - address: "0.0.0.0:6667"
      tls: false
    - address: "0.0.0.0:6697"
      tls: true
      cert_file: /etc/ircat/tls/cert.pem
      key_file: /etc/ircat/tls/key.pem
  limits:
    max_clients: 10000
    max_channels_per_user: 50
    sendq_bytes: 1048576
    ping_interval_seconds: 120
    ping_timeout_seconds: 240

storage:
  driver: postgres
  postgres:
    # The DSN is pulled from $IRCAT_POSTGRES_DSN at boot. The compose
    # stack constructs it from POSTGRES_PASSWORD; in other deployments
    # set it directly. The config loader does NOT do shell-style env
    # interpolation, so embedding ${VAR} literally in `dsn` would be
    # passed verbatim to pgx and break the connection.
    dsn_env: IRCAT_POSTGRES_DSN
    max_open_conns: 20
    max_idle_conns: 5

dashboard:
  enabled: true
  address: "0.0.0.0:8080"
  tls:
    enabled: false

api:
  enabled: true

auth:
  password_hash: argon2id
  initial_admin:
    username: admin
    password_env: IRCAT_INITIAL_ADMIN_PASSWORD

events:
  sinks:
    - type: jsonl
      path: /var/log/ircat/events.jsonl
      rotate_mb: 100
      keep: 14

bots:
  enabled: true
  max_bots: 100

# Federation is opt-in. Most operators run a single ircat node
# and the federation block is dead weight on a standalone box,
# so the entire section is commented out by default. Uncomment
# the block below and edit it to enable server-to-server links.
#
# federation:
#   enabled: true
#   my_server_name: irc.example.org
#   # Listen for inbound peer connections. Omit listen_address
#   # entirely if this node only dials outbound.
#   listen_address: "0.0.0.0:7000"
#   # Optional in-process TLS for the inbound listener. Both
#   # paths must be set to enable TLS.
#   listen_cert_file: /etc/ircat/fed-cert.pem
#   listen_key_file: /etc/ircat/fed-key.pem
#   # broadcast_mode: subscription is the v1.1+ default and
#   # is strictly better than fanout in every measured case.
#   # The fanout fallback is documented for removal in v1.3.
#   broadcast_mode: subscription
#   links:
#     - name: irc.peer.org
#       accept: true       # accept inbound connections from this peer
#       connect: true      # also dial them outbound (mesh both ways)
#       host: 10.0.0.2
#       port: 7000
#       password_in_env: IRCAT_LINK_PEER_IN
#       password_out_env: IRCAT_LINK_PEER_OUT
#       tls: true                            # dial peer over TLS
#       tls_fingerprint: "sha256:abcdef..."  # pin the peer leaf cert

logging:
  level: info
  format: json
  ring_buffer_entries: 10000
