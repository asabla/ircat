root = "."
tmp_dir = "tmp"

[build]
  cmd = "go build -o ./tmp/ircat ./cmd/ircat"
  bin = "./tmp/ircat --config ${IRCAT_CONFIG}"
  include_ext = ["go", "html", "tmpl", "yaml", "yml", "json", "sql"]
  exclude_dir = ["tmp", "vendor", "docs", ".git", ".devcontainer"]
  delay = 500
  stop_on_error = true
  send_interrupt = true
  kill_delay = 2000

[log]
  time = true

[misc]
  clean_on_exit = true
