# Production-oriented compose stack.
# - ircat built from source via multi-stage Dockerfile
# - Postgres as the primary datastore
# - Named volumes for durable data
#
# Event export uses the built-in jsonl and webhook sinks; there is
# no external event broker in the production stack.
#
# Override via docker-compose.override.yml or environment variables.
# Secrets are read from a local .env file; do not commit it.
#
# The dashboard listener (default 8080) hosts both the operator UI
# and the unauthenticated /metrics endpoint. Do not expose 8080 to
# the public internet directly — front it with a reverse proxy and
# IP-allowlist /metrics.
#
# Federation: set IRCAT_FED_PORT in .env to expose the inbound peer
# listener (default 7000). Leave unset to keep federation private.

services:
  ircat:
    build:
      context: .
      dockerfile: docker/Dockerfile
      args:
        VERSION: ${IRCAT_VERSION:-dev}
    image: ghcr.io/asabla/ircat:${IRCAT_VERSION:-dev}
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    # Host ports are env-overridable to avoid collisions with whatever
    # else is running on the host. Defaults are the canonical IRC,
    # IRC-TLS, and dashboard ports.
    ports:
      - "${IRCAT_IRC_PORT:-6667}:6667"
      - "${IRCAT_IRC_TLS_PORT:-6697}:6697"
      - "${IRCAT_DASHBOARD_PORT:-8080}:8080"
      # To publish the federation listener (default port 7000),
      # add an override file with:
      #   services:
      #     ircat:
      #       ports:
      #         - "${IRCAT_FED_PORT:-7000}:7000"
    environment:
      IRCAT_INITIAL_ADMIN_PASSWORD: ${IRCAT_INITIAL_ADMIN_PASSWORD:?set in .env}
      IRCAT_WEBHOOK_SECRET: ${IRCAT_WEBHOOK_SECRET:-}
      # Compose interpolates ${POSTGRES_PASSWORD} from .env and the
      # resulting plain DSN is what ircat reads via dsn_env.
      IRCAT_POSTGRES_DSN: postgres://ircat:${POSTGRES_PASSWORD:?set in .env}@postgres:5432/ircat?sslmode=disable
    volumes:
      - ./config/production.yaml:/etc/ircat/config.yaml:ro
      - ircat-data:/var/lib/ircat
      - ircat-logs:/var/log/ircat
    healthcheck:
      test: ["CMD", "/app/ircat", "healthcheck", "--address", "http://localhost:8080/healthz"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    # Hardening: drop every Linux capability we do not need, refuse
    # privilege escalation, and run with a read-only root filesystem.
    # The two volume mounts (data + logs) are the only writable
    # paths inside the container.
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    read_only: true
    tmpfs:
      - /tmp:size=64m,mode=1777
    deploy:
      resources:
        limits:
          cpus: "2.0"
          memory: 1G
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "5"

  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ircat
      POSTGRES_USER: ircat
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?set in .env}
    volumes:
      - ircat-pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ircat -d ircat"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 512M
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "5"

volumes:
  ircat-data:
  ircat-logs:
  ircat-pgdata:
