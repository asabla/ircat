# GoReleaser config for ircat.
#
# Drives the release pipeline that runs against every signed
# git tag. The pipeline produces:
#
#   - Linux + macOS binaries (amd64, arm64) packaged in tar.gz
#     archives, plus a checksums file
#   - Multi-arch container images pushed to ghcr.io/asabla/ircat
#     (linux/amd64 + linux/arm64), with the canonical tag
#     plus :latest for stable releases
#   - SBOMs (CycloneDX) generated by syft for both the binaries
#     and the container image
#   - Cosign signatures over every release artefact and the
#     container manifest. Signing is keyless via the OIDC
#     provider in CI; locally `cosign generate-key-pair` and set
#     COSIGN_PASSWORD before running goreleaser
#   - GitHub release notes generated from the conventional-
#     commit history since the previous tag
#
# Run locally with `goreleaser release --snapshot --clean` to
# build the artefacts under ./dist without publishing.

version: 2

project_name: ircat

before:
  hooks:
    - go mod tidy
    - go vet ./...

builds:
  - id: ircat
    main: ./cmd/ircat
    binary: ircat
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
    goarch:
      - amd64
      - arm64
    flags:
      - -trimpath
    ldflags:
      - -s -w
      - -X main.version={{.Version}}
      - -X main.commit={{.ShortCommit}}
      - -X main.date={{.Date}}

archives:
  - id: ircat
    formats: [tar.gz]
    name_template: >-
      {{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}
    files:
      - LICENSE*
      - README.md
      - docs/OPERATIONS.md
      - docs/PROTOCOL.md
      - docker/default-config.yaml

checksum:
  name_template: 'checksums.txt'

snapshot:
  version_template: '{{ incpatch .Version }}-next'

changelog:
  sort: asc
  use: github
  filters:
    exclude:
      - '^docs:'
      - '^test:'
      - '^chore:'
      - '^ci:'
  groups:
    - title: Features
      regexp: '^feat'
      order: 0
    - title: Fixes
      regexp: '^fix'
      order: 1
    - title: Performance
      regexp: '^perf'
      order: 2
    - title: Refactoring
      regexp: '^refactor'
      order: 3

dockers:
  - image_templates:
      - 'ghcr.io/asabla/ircat:{{ .Version }}-amd64'
    dockerfile: docker/Dockerfile.release
    use: buildx
    extra_files:
      - docker/default-config.yaml
    build_flag_templates:
      - '--platform=linux/amd64'
      - '--label=org.opencontainers.image.title={{ .ProjectName }}'
      - '--label=org.opencontainers.image.version={{ .Version }}'
      - '--label=org.opencontainers.image.created={{ .Date }}'
      - '--label=org.opencontainers.image.revision={{ .FullCommit }}'
      - '--label=org.opencontainers.image.source=https://github.com/asabla/ircat'
  - image_templates:
      - 'ghcr.io/asabla/ircat:{{ .Version }}-arm64'
    goarch: arm64
    dockerfile: docker/Dockerfile.release
    use: buildx
    extra_files:
      - docker/default-config.yaml
    build_flag_templates:
      - '--platform=linux/arm64'
      - '--label=org.opencontainers.image.title={{ .ProjectName }}'
      - '--label=org.opencontainers.image.version={{ .Version }}'
      - '--label=org.opencontainers.image.created={{ .Date }}'
      - '--label=org.opencontainers.image.revision={{ .FullCommit }}'
      - '--label=org.opencontainers.image.source=https://github.com/asabla/ircat'

docker_manifests:
  - id: versioned
    name_template: 'ghcr.io/asabla/ircat:{{ .Version }}'
    image_templates:
      - 'ghcr.io/asabla/ircat:{{ .Version }}-amd64'
      - 'ghcr.io/asabla/ircat:{{ .Version }}-arm64'
  - id: latest
    name_template: 'ghcr.io/asabla/ircat:latest'
    image_templates:
      - 'ghcr.io/asabla/ircat:{{ .Version }}-amd64'
      - 'ghcr.io/asabla/ircat:{{ .Version }}-arm64'
    skip_push: auto

sboms:
  - id: archive
    artifacts: archive
    documents:
      - '{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}.sbom.json'

signs:
  - id: cosign
    cmd: cosign
    artifacts: checksum
    output: true
    args:
      - sign-blob
      - '--yes'
      - '--output-signature=${signature}'
      - '${artifact}'

docker_signs:
  - id: cosign-image
    cmd: cosign
    # Sign only the versioned manifest, not :latest. Both tags
    # resolve to the same digest, so cosign tries to push the
    # same .sig tag twice and ghcr.io rejects the duplicate.
    ids:
      - versioned
    artifacts: manifests
    output: true
    args:
      - sign
      - '--yes'
      - '${artifact}'

release:
  github:
    owner: asabla
    name: ircat
  draft: false
  prerelease: auto
  name_template: 'ircat {{ .Version }}'
  header: |
    ircat {{ .Version }}

    See [`docs/PROTOCOL.md`](https://github.com/asabla/ircat/blob/main/docs/PROTOCOL.md)
    for the wire-level reference and [`docs/PLAN.md`](https://github.com/asabla/ircat/blob/main/docs/PLAN.md)
    for what's next.

    Verify the release artefacts:

    ```sh
    cosign verify-blob \
      --certificate-identity-regexp 'https://github.com/asabla/ircat/.*' \
      --certificate-oidc-issuer https://token.actions.githubusercontent.com \
      --signature checksums.txt.sig \
      checksums.txt
    ```
  footer: |
    ---

    **Container images**

    ```sh
    docker pull ghcr.io/asabla/ircat:{{ .Version }}
    ```
